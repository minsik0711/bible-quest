<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Quest - 전투 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0e1a;color:#e8e8e8;font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite;}
@keyframes twinkle{0%,100%{opacity:0.2;}50%{opacity:1;}}
.battle-wrap{position:relative;z-index:1;width:100%;max-width:430px;padding:0 0 20px;}

/* HUD */
.hud{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;gap:10px;}
.hud-box{flex:1;}
.hud-name{font-family:'Black Han Sans';font-size:12px;margin-bottom:4px;}
.hud-name.player{color:#f4d03f;}
.hud-name.enemy{color:#e74c3c;text-align:right;}
.hp-bar-wrap{height:10px;background:#ffffff15;border-radius:99px;overflow:hidden;}
.hp-bar{height:100%;border-radius:99px;transition:width 0.5s ease;}
.hp-bar.player{background:linear-gradient(90deg,#22c55e,#86efac);}
.hp-bar.enemy{background:linear-gradient(90deg,#ef4444,#fca5a5);}
.hp-text{font-size:10px;color:#888;margin-top:2px;}
.hp-text.right{text-align:right;}
.vs-badge{font-family:'Black Han Sans';font-size:16px;color:#f4d03f;align-self:center;}

/* 웨이브 */
.wave-bar{display:flex;justify-content:center;gap:6px;padding:4px 16px 8px;}
.wave-dot{width:28px;height:6px;border-radius:99px;background:#ffffff15;transition:all 0.3s;}
.wave-dot.done{background:#22c55e;}
.wave-dot.current{background:#f4d03f;box-shadow:0 0 6px #f4d03f88;}
.wave-label{text-align:center;font-family:'Black Han Sans';font-size:11px;color:#f4d03f88;margin-bottom:6px;}

/* 전투 씬 */
.battle-scene{position:relative;height:240px;margin:0 16px;border-radius:20px;overflow:hidden;border:1px solid #ffffff10;}
.scene-bg{position:absolute;inset:0;transition:background 1s;}
.ground{position:absolute;bottom:0;left:0;right:0;height:45px;}
.battle-glow{position:absolute;width:180px;height:180px;border-radius:50%;filter:blur(50px);opacity:0.2;pointer-events:none;transition:background 1s;}
.battle-glow.left{left:-40px;top:40px;}
.battle-glow.right{right:-40px;top:40px;}
.skill-flash{position:absolute;inset:0;border-radius:20px;pointer-events:none;opacity:0;transition:opacity 0.15s;}
.skill-flash.show{opacity:1;}

/* 캐릭터 */
.character{position:absolute;bottom:45px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.character.player-char{left:20px;}
.character.enemy-char{right:20px;}
.char-shadow{width:36px;height:7px;background:#00000066;border-radius:50%;filter:blur(3px);}
.char-name-tag{font-family:'Black Han Sans';font-size:10px;background:#00000099;padding:2px 7px;border-radius:99px;white-space:nowrap;}
.char-name-tag.p{color:#f4d03f;}
.char-name-tag.e{color:#e74c3c;}
canvas.char-canvas{image-rendering:pixelated;}

/* 애니메이션 */
@keyframes idle-bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes enemy-idle{0%,100%{transform:scaleX(-1) translateY(0);}50%{transform:scaleX(-1) translateY(-4px);}}
@keyframes player-attack{0%{transform:translateX(0);}40%{transform:translateX(55px);}70%{transform:translateX(55px);}100%{transform:translateX(0);}}
@keyframes enemy-hit{0%{transform:scaleX(-1);}20%{transform:scaleX(-1) translateX(12px);}100%{transform:scaleX(-1) translateX(0);}}
@keyframes enemy-attack{0%{transform:scaleX(-1) translateX(0);}40%{transform:scaleX(-1) translateX(-55px);}70%{transform:scaleX(-1) translateX(-55px);}100%{transform:scaleX(-1) translateX(0);}}
@keyframes player-hit{0%{transform:translateX(0);}20%{transform:translateX(-12px);}100%{transform:translateX(0);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
@keyframes dmg-float{0%{opacity:1;transform:translateY(0) scale(1.3);}100%{opacity:0;transform:translateY(-55px) scale(0.8);}}
@keyframes levelup-pop{0%{opacity:0;transform:scale(0.5);}50%{opacity:1;transform:scale(1.2);}100%{opacity:0;transform:scale(1) translateY(-40px);}}
@keyframes wave-clear{0%{opacity:0;transform:scale(0.8);}30%{opacity:1;transform:scale(1.1);}80%{opacity:1;}100%{opacity:0;transform:scale(0.9) translateY(-20px);}}

.player-char{animation:idle-bob 1.5s ease-in-out infinite;}
.enemy-char{animation:enemy-idle 1.8s ease-in-out infinite;}
.battle-scene.shake{animation:shake 0.3s ease;}

/* 데미지 숫자 */
.dmg-num{position:absolute;font-family:'Black Han Sans';font-size:20px;pointer-events:none;animation:dmg-float 1s ease forwards;z-index:10;}
.dmg-num.pdmg{color:#fbbf24;text-shadow:0 0 8px #f4d03f;}
.dmg-num.edmg{color:#ef4444;text-shadow:0 0 8px #e74c3c;}
.dmg-num.heal{color:#22c55e;text-shadow:0 0 8px #22c55e;}
.dmg-num.crit{font-size:26px;color:#fff;text-shadow:0 0 12px #f4d03f;}

/* 결과 오버레이 */
.result-overlay{position:absolute;inset:0;border-radius:20px;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(4px);}
.result-overlay.show{display:flex;}
.result-overlay.win{background:#05302099;}
.result-overlay.lose{background:#30050899;}
.result-title{font-family:'Black Han Sans';font-size:30px;}
.result-title.win{color:#22c55e;text-shadow:0 0 20px #22c55e;}
.result-title.lose{color:#ef4444;text-shadow:0 0 20px #ef4444;}
.result-sub{font-size:12px;color:#aaa;margin-top:6px;text-align:center;padding:0 20px;}
.result-btn{margin-top:12px;padding:9px 22px;background:linear-gradient(135deg,#f4d03f,#f39c12);border:none;border-radius:10px;font-family:'Black Han Sans';font-size:13px;color:#0a0e1a;cursor:pointer;}

/* 웨이브 클리어 팝업 */
.wave-clear-popup{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:15;}
.wave-clear-text{font-family:'Black Han Sans';font-size:28px;color:#f4d03f;text-shadow:0 0 20px #f4d03f;opacity:0;}

/* 배틀 로그 */
.battle-log{margin:8px 16px 0;background:#ffffff08;border:1px solid #ffffff10;border-radius:12px;padding:8px 12px;font-size:11px;color:#aaa;min-height:36px;line-height:1.6;}
.battle-log .gold{color:#f4d03f;font-weight:700;}
.battle-log .red{color:#e74c3c;}
.battle-log .green{color:#22c55e;}
.battle-log .purple{color:#a78bfa;}

/* MP/SP */
.bars-row{display:flex;gap:8px;padding:6px 16px 0;align-items:center;}
.bar-label{font-family:'Black Han Sans';font-size:10px;width:20px;}
.bar-label.mp{color:#8b5cf6;}
.bar-label.sp{color:#f59e0b;}
.bar-wrap{flex:1;height:6px;background:#ffffff10;border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width 0.3s;}
.bar-fill.mp{background:linear-gradient(90deg,#8b5cf6,#a78bfa);}
.bar-fill.sp{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.bar-val{font-size:9px;color:#ffffff44;width:44px;text-align:right;}

/* 스킬 */
.skill-bar{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:7px 16px 0;}
.skill-btn{padding:10px 6px;border:none;border-radius:11px;font-family:'Black Han Sans';font-size:12px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.skill-btn:disabled{opacity:0.35;cursor:not-allowed;}
.skill-btn:active:not(:disabled){transform:scale(0.96);}
.skill-btn.normal{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;}
.skill-btn.special{background:linear-gradient(135deg,#92400e,#f59e0b);color:#fff;}
.skill-btn.heal{background:linear-gradient(135deg,#14532d,#22c55e);color:#fff;}
.skill-btn.ultimate{background:linear-gradient(135deg,#4c1d95,#8b5cf6);color:#fff;}
.skill-sub{font-size:9px;color:#ffffff88;display:block;margin-top:1px;}
.skill-cost{position:absolute;top:3px;right:5px;font-size:8px;color:#fbbf24;}

/* 레벨업 팝업 */
.levelup-popup{position:absolute;top:30%;left:50%;transform:translateX(-50%);font-family:'Black Han Sans';font-size:22px;color:#f4d03f;text-shadow:0 0 15px #f4d03f;pointer-events:none;white-space:nowrap;opacity:0;z-index:25;}

/* 플레이어 레벨 표시 */
.player-level-info{display:flex;align-items:center;gap:10px;padding:6px 16px 0;}
.plv-badge{font-family:'Black Han Sans';font-size:11px;background:linear-gradient(135deg,#f4d03f,#f39c12);color:#0a0e1a;padding:2px 8px;border-radius:99px;}
.plv-xp-wrap{flex:1;height:5px;background:#ffffff10;border-radius:99px;overflow:hidden;}
.plv-xp-bar{height:100%;background:linear-gradient(90deg,#f4d03f,#f39c12);border-radius:99px;transition:width 0.5s;}
.plv-xp-text{font-size:9px;color:#f4d03f88;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="battle-wrap">
  <!-- 플레이어 레벨 -->
  <div class="player-level-info">
    <div class="plv-badge" id="plv-badge">Lv.1 베드로</div>
    <div class="plv-xp-wrap"><div class="plv-xp-bar" id="plv-xp-bar" style="width:0%"></div></div>
    <div class="plv-xp-text" id="plv-xp-text">0 XP</div>
  </div>

  <!-- 웨이브 -->
  <div class="wave-label" id="wave-label">⚔️ WAVE 1 — 의심의 뱀</div>
  <div class="wave-bar" id="wave-bar"></div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-box">
      <div class="hud-name player" id="player-hud-name">⚔️ 베드로</div>
      <div class="hp-bar-wrap"><div class="hp-bar player" id="player-hp-bar" style="width:100%"></div></div>
      <div class="hp-text" id="player-hp-text">HP 100 / 100</div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="hud-box">
      <div class="hud-name enemy" id="enemy-hud-name">의심의 뱀 🐍</div>
      <div class="hp-bar-wrap"><div class="hp-bar enemy" id="enemy-hp-bar" style="width:100%"></div></div>
      <div class="hp-text right" id="enemy-hp-text">HP 60 / 60</div>
    </div>
  </div>

  <!-- 전투 씬 -->
  <div class="battle-scene" id="battle-scene">
    <div class="scene-bg" id="scene-bg"></div>
    <div class="ground" id="scene-ground"></div>
    <div class="battle-glow left" id="glow-left"></div>
    <div class="battle-glow right" id="glow-right"></div>
    <div class="skill-flash" id="skill-flash"></div>
    <div class="character player-char" id="player-char">
      <div class="char-name-tag p" id="player-tag">베드로 Lv.1</div>
      <canvas class="char-canvas" id="player-canvas" width="48" height="64"></canvas>
      <div class="char-shadow"></div>
    </div>
    <div class="character enemy-char" id="enemy-char">
      <div class="char-name-tag e" id="enemy-tag">의심의 뱀</div>
      <canvas class="char-canvas" id="enemy-canvas" width="48" height="64"></canvas>
      <div class="char-shadow"></div>
    </div>
    <div class="wave-clear-popup"><div class="wave-clear-text" id="wave-clear-text"></div></div>
    <div class="levelup-popup" id="levelup-popup">LEVEL UP! ⬆️</div>
    <div class="result-overlay" id="result-overlay">
      <div class="result-title" id="result-title">승리!</div>
      <div class="result-sub" id="result-sub"></div>
      <button class="result-btn" onclick="resetBattle()">🔄 다시 도전</button>
    </div>
  </div>

  <!-- 배틀 로그 -->
  <div class="battle-log" id="battle-log">⚔️ <span class="gold">베드로</span>가 전투를 시작합니다!</div>

  <!-- MP / 영적 게이지 -->
  <div class="bars-row">
    <div class="bar-label mp">MP</div>
    <div class="bar-wrap"><div class="bar-fill mp" id="mp-bar" style="width:60%"></div></div>
    <div class="bar-val" id="mp-val">60/100</div>
    <div class="bar-label sp">SP</div>
    <div class="bar-wrap"><div class="bar-fill sp" id="sp-bar" style="width:0%"></div></div>
    <div class="bar-val" id="sp-val">0/100</div>
  </div>

  <!-- 스킬 -->
  <div class="skill-bar">
    <button class="skill-btn normal" id="btn0" onclick="playerAttack(0)">⚔️ 기본 공격<span class="skill-sub">데미지 15~25</span></button>
    <button class="skill-btn special" id="btn1" onclick="playerAttack(1)">⚓ 반석의 고백<span class="skill-sub">강타 30~45</span><span class="skill-cost">30MP</span></button>
    <button class="skill-btn heal" id="btn2" onclick="playerAttack(2)">💚 믿음의 회복<span class="skill-sub">HP +25 회복</span><span class="skill-cost">20MP</span></button>
    <button class="skill-btn ultimate" id="btn3" onclick="playerAttack(3)">✨ 성령의 검<span class="skill-sub">필살 60~90</span><span class="skill-cost">60MP</span></button>
  </div>
</div>

<script>
// ── 별 ──
const starsEl=document.getElementById('stars');
for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;`;starsEl.appendChild(s);}

// ── 보스 데이터 (7웨이브) ──
const BOSSES = [
  {
    name:'의심의 뱀', icon:'🐍', wave:1,
    hp:60, atk:[6,12], special:'독 주입', specialChance:0.3,
    color:'#22c55e', bg:'linear-gradient(180deg,#0d2b1a,#1a3a1a)', ground:'linear-gradient(180deg,#1a3a1a,#0d2210)',
    desc:'창세기 3장 — 에덴의 뱀',
    xp:30,
    draw(ctx,f){
      ctx.clearRect(0,0,48,64);
      const b=f%2===0?0:1;
      const G='#15803d',D='#14532d',Y='#fbbf24',R='#ef4444',E='#000';
      // 뱀 몸통
      const s=[[,'T','T',G,G,G,'T','T'],[,'T',G,G,G,G,G,'T'],[,G,G,Y,G,Y,G,G],[,G,G,G,G,G,G,G],[,'T',G,D,G,D,G,'T'],[,'T','T',G,G,G,'T','T'],[,'T','T',D,G,D,'T','T'],[,'T','T','T',G,'T','T','T'],[,'T','T','T',G,'T','T','T'],[,'T','T','T',D,'T','T','T']];
      s.forEach((r,y)=>r.forEach((c,x)=>{if(c&&c!=='T'){ctx.fillStyle=c;ctx.fillRect(x*6,(y+b)*6,6,6);}}));
      // 혀
      ctx.fillStyle=R;ctx.fillRect(18,(4+b)*6,3,3);ctx.fillRect(24,(4+b)*6,3,3);
    }
  },
  {
    name:'골리앗', icon:'👹', wave:2,
    hp:120, atk:[12,22], special:'대지 강타', specialChance:0.35,
    color:'#f97316', bg:'linear-gradient(180deg,#1c1008,#2d1a08)', ground:'linear-gradient(180deg,#3d2408,#1c0a00)',
    desc:'사무엘상 17장 — 블레셋의 거인',
    xp:55,
    draw(ctx,f){
      ctx.clearRect(0,0,48,64);
      const b=f%2===0?0:1;
      const SK='#d4956a',HR='#5c3317',AR='#94a3b8',MT='#64748b',RD='#dc2626',BR='#92400e';
      const s=[[,'T','T',HR,HR,HR,HR,'T'],[,'T',HR,SK,SK,SK,SK,HR],[,'T',SK,SK,'#333',SK,SK,SK],[,'T',SK,SK,SK,SK,SK,SK],[,AR,AR,SK,SK,SK,AR,AR],[,AR,MT,AR,AR,AR,MT,AR],[,BR,BR,AR,AR,AR,BR,BR],[,BR,'T','T','T','T','T',BR],[,MT,'T','T','T','T','T',MT],[,MT,'T','T','T','T','T',MT]];
      s.forEach((r,y)=>r.forEach((c,x)=>{if(c&&c!=='T'){ctx.fillStyle=c;ctx.fillRect(x*6,(y+b)*6,6,6);}}));
      // 창
      ctx.fillStyle=MT;for(let i=0;i<9;i++)ctx.fillRect(42,i*6+b*6,3,6);
      ctx.fillStyle='#fbbf24';ctx.fillRect(39,b*6,6,6);
    }
  },
  {
    name:'바알 제사장', icon:'🔥', wave:3,
    hp:150, atk:[14,24], special:'불의 저주', specialChance:0.4,
    color:'#ef4444', bg:'linear-gradient(180deg,#1c0808,#2d0808)', ground:'linear-gradient(180deg,#3d0808,#200000)',
    desc:'열왕기상 18장 — 바알의 종',
    xp:80,
    draw(ctx,f){
      ctx.clearRect(0,0,48,64);
      const b=f%2===0?0:1;
      const RD='#dc2626',DR='#7f1d1d',SK='#c4956a',BK='#1c1c1c',GD='#fbbf24',PR='#9333ea';
      const s=[[,'T','T',BK,BK,BK,BK,'T'],[,'T',BK,SK,SK,SK,SK,BK],[,'T',SK,SK,RD,SK,SK,SK],[,'T',SK,SK,SK,SK,SK,SK],[,RD,RD,PR,PR,PR,RD,RD],[,RD,GD,RD,RD,RD,GD,RD],[,DR,DR,RD,RD,RD,DR,DR],[,DR,'T',BK,BK,BK,'T',DR],[,BK,'T','T','T','T','T',BK],[,BK,'T','T','T','T','T',BK]];
      s.forEach((r,y)=>r.forEach((c,x)=>{if(c&&c!=='T'){ctx.fillStyle=c;ctx.fillRect(x*6,(y+b)*6,6,6);}}));
      // 불 이펙트
      if(f%2===0){ctx.fillStyle='#f97316';ctx.fillRect(0,b*6,6,12);ctx.fillStyle='#fbbf24';ctx.fillRect(0,(b+1)*6,3,6);}
    }
  },
  {
    name:'레비아탄', icon:'🐉', wave:4,
    hp:200, atk:[16,28], special:'심해의 포효', specialChance:0.35,
    color:'#06b6d4', bg:'linear-gradient(180deg,#020d1a,#0a1f3a)', ground:'linear-gradient(180deg,#0a2040,#020d20)',
    desc:'욥기 41장 — 바다의 괴수',
    xp:110,
    draw(ctx,f){
      ctx.clearRect(0,0,48,64);
      const b=f%2===0?0:1;
      const BL='#0e7490',DB='#164e63',CY='#22d3ee',SC='#0891b2',EY='#f0f9ff',DR='#7c3aed';
      const s=[[,'T',BL,BL,BL,BL,BL,'T'],[,BL,SC,SC,SC,SC,SC,BL],[,BL,SC,EY,SC,EY,SC,BL],[,DB,BL,BL,BL,BL,BL,DB],[,DB,SC,CY,CY,CY,SC,DB],[,BL,BL,DB,DB,DB,BL,BL],[,'T',DB,DB,'T',DB,DB,'T'],[,'T',BL,BL,'T',BL,BL,'T'],[,'T','T',DB,'T',DB,'T','T'],[,'T','T',BL,'T',BL,'T','T']];
      s.forEach((r,y)=>r.forEach((c,x)=>{if(c&&c!=='T'){ctx.fillStyle=c;ctx.fillRect(x*6,(y+b)*6,6,6);}}));
      // 뿔
      ctx.fillStyle=CY;ctx.fillRect(6,b*6,3,6);ctx.fillRect(36,b*6,3,6);
    }
  },
  {
    name:'아볼루온', icon:'👿', wave:5,
    hp:260, atk:[18,32], special:'지옥의 군단', specialChance:0.45,
    color:'#7c3aed', bg:'linear-gradient(180deg,#0d0620,#1a0a35)', ground:'linear-gradient(180deg,#200d40,#0d0220)',
    desc:'요한계시록 9장 — 무저갱의 사자',
    xp:150,
    draw(ctx,f){
      ctx.clearRect(0,0,48,64);
      const b=f%2===0?0:1;
      const PR='#7c3aed',DP='#4c1d95',RD='#dc2626',BK='#1c1c1c',GD='#fbbf24',WG='#6d28d9';
      const s=[[,PR,'T',DP,DP,DP,'T',PR],[,'T',PR,PR,PR,PR,PR,'T'],[,'T',PR,GD,PR,GD,PR,'T'],[,'T',PR,PR,RD,PR,PR,'T'],[,WG,WG,DP,DP,DP,WG,WG],[,WG,GD,WG,WG,WG,GD,WG],[,DP,DP,WG,WG,WG,DP,DP],[,DP,'T',BK,BK,BK,'T',DP],[,RD,'T','T','T','T','T',RD],[,RD,'T','T','T','T','T',RD]];
      s.forEach((r,y)=>r.forEach((c,x)=>{if(c&&c!=='T'){ctx.fillStyle=c;ctx.fillRect(x*6,(y+b)*6,6,6);}}));
      // 날개
      if(f%2===0){ctx.fillStyle=WG+'88';ctx.fillRect(0,2*6+b*6,6,18);ctx.fillRect(42,2*6+b*6,6,18);}
    }
  },
  {
    name:'바알세불', icon:'😈', wave:6,
    hp:320, atk:[20,36], special:'파리 떼 저주', specialChance:0.5,
    color:'#10b981', bg:'linear-gradient(180deg,#041a0e,#082a18)', ground:'linear-gradient(180deg,#0a3020,#041008)',
    desc:'마태복음 12장 — 귀신의 왕',
    xp:200,
    draw(ctx,f){
      ctx.clearRect(0,0,48,64);
      const b=f%2===0?0:1;
      const GR='#15803d',DG='#14532d',RD='#dc2626',GD='#fbbf24',BK='#111',SK='#86efac';
      const s=[[,GR,GR,'T','T','T',GR,GR],[,'T',GR,GR,GR,GR,GR,'T'],[,'T',GR,SK,GR,SK,GR,'T'],[,'T',SK,GR,GR,GR,SK,'T'],[,DG,DG,GR,GR,GR,DG,DG],[,DG,GD,DG,DG,DG,GD,DG],[,BK,BK,DG,DG,DG,BK,BK],[,BK,'T',GR,GR,GR,'T',BK],[,RD,'T','T',GR,'T','T',RD],[,RD,'T','T',DG,'T','T',RD]];
      s.forEach((r,y)=>r.forEach((c,x)=>{if(c&&c!=='T'){ctx.fillStyle=c;ctx.fillRect(x*6,(y+b)*6,6,6);}}));
    }
  },
  {
    name:'붉은 용', icon:'🐲', wave:7,
    hp:500, atk:[24,42], special:'용의 불꽃', specialChance:0.55,
    color:'#ef4444', bg:'linear-gradient(180deg,#1c0000,#3d0000)', ground:'linear-gradient(180deg,#4d0000,#200000)',
    desc:'요한계시록 12장 — 일곱 머리 열 뿔의 용 [최종보스]',
    xp:350, isBoss:true,
    draw(ctx,f){
      ctx.clearRect(0,0,48,64);
      const b=f%2===0?0:1;
      const R='#dc2626',DR='#7f1d1d',OR='#f97316',GD='#fbbf24',BK='#111',WH='#fef2f2';
      const s=[[,R,R,BK,DR,BK,R,R],[,DR,R,R,R,R,R,DR],[,R,R,WH,R,WH,R,R],[,DR,R,OR,R,OR,R,DR],[,R,GD,R,DR,R,GD,R],[,DR,R,DR,DR,DR,R,DR],[,BK,BK,R,R,R,BK,BK],[,BK,'T',DR,DR,DR,'T',BK],[,OR,'T','T',R,'T','T',OR],[,OR,'T','T',DR,'T','T',OR]];
      s.forEach((r,y)=>r.forEach((c,x)=>{if(c&&c!=='T'){ctx.fillStyle=c;ctx.fillRect(x*6,(y+b)*6,6,6);}}));
      // 불꽃 (최종보스 이펙트)
      if(f%2===0){
        ctx.fillStyle='#f97316';ctx.fillRect(0,b*6,6,18);ctx.fillRect(42,b*6,6,18);
        ctx.fillStyle='#fbbf24';ctx.fillRect(3,(b+1)*6,3,6);ctx.fillRect(42,(b+1)*6,3,6);
      }
      // 뿔 7개 암시
      ctx.fillStyle=GD;
      [0,6,12,18,24,30,36].forEach(x=>ctx.fillRect(x,b*6,3,3));
    }
  }
];

// ── 플레이어 레벨별 스탯 ──
function getPlayerStats(lv){
  return {
    hp: 80 + lv*20,
    atk: [10+lv*3, 20+lv*5],
    mp: 100,
    name: ['','새싹 제자','말씀 탐험가','믿음의 전사','지혜의 수호자','은혜의 기사','빛의 사도','성령의 검사'][Math.min(lv,7)] || '하나님의 용사'
  };
}

// ── 플레이어 그리기 (레벨별 외형 변화) ──
function drawPeter(ctx, f, lv){
  ctx.clearRect(0,0,48,64);
  const b=f%2===0?0:1;
  const SK='#f5cba7',HR='#8B4513';
  // 레벨별 갑옷 색
  const armorColors = ['#3b82f6','#3b82f6','#6366f1','#8b5cf6','#a855f7','#ec4899','#f97316','#ef4444'];
  const AR = armorColors[Math.min(lv-1,7)];
  const metalColors = ['#94a3b8','#94a3b8','#a78bfa','#c084fc','#e879f9','#fb7185','#fbbf24','#fef08a'];
  const MT = metalColors[Math.min(lv-1,7)];
  const GD='#fbbf24';

  const s=[
    ['T','T',HR,HR,HR,HR,'T','T'],
    ['T',HR,SK,SK,SK,SK,HR,'T'],
    ['T',SK,SK,'#5c3317',SK,SK,SK,'T'],
    ['T',SK,SK,SK,SK,SK,SK,'T'],
    [AR,AR,AR,AR,AR,AR,AR,AR],
    [AR,MT,AR,AR,AR,MT,AR,AR],
    [AR,AR,MT,AR,AR,MT,AR,AR],
    ['#1e293b','#1e293b','T','T','T','T','#1e293b','#1e293b'],
    ['#1e293b','#1e293b','T','T','T','T','#1e293b','#1e293b'],
    ['T','#1e293b','T','T','T','T','#1e293b','T'],
  ];
  s.forEach((r,y)=>r.forEach((c,x)=>{if(c!=='T'){ctx.fillStyle=c;ctx.fillRect(x*6,(y+b)*6,6,6);}}));
  // 무기 (레벨 높을수록 빛남)
  const wc = lv>=5?GD:MT;
  for(let i=0;i<8;i++){ctx.fillStyle=i===0?GD:wc;ctx.fillRect(42,i*6+b*6,4,6);}
  // 레벨 4+ 후광
  if(lv>=4){ctx.fillStyle=AR+'44';ctx.beginPath();ctx.arc(24,20+b*3,22,0,Math.PI*2);ctx.fill();}
}

// ── 상태 ──
let wave=0, playerLv=1, playerXP=0, playerXPNeeded=50;
let playerHP, playerMaxHP, mp=100, sp=0;
let enemyHP, enemyMaxHP;
let isBattling=false, gameOver=false, animF=0;
let statusEffect=null; // 독, 저주 등

const XP_TABLE=[0,50,120,220,360,550,800,1100,1500,2000];

function initWave(){
  const boss=BOSSES[wave];
  const pStats=getPlayerStats(playerLv);
  playerMaxHP=pStats.hp; if(!playerHP||playerHP>playerMaxHP) playerHP=playerMaxHP;
  enemyMaxHP=boss.hp; enemyHP=boss.hp;
  mp=Math.min(mp+30,100); sp=0; statusEffect=null;
  gameOver=false; isBattling=false;

  // 씬 배경
  document.getElementById('scene-bg').style.background=boss.bg;
  document.getElementById('scene-ground').style.background=boss.ground;
  document.getElementById('glow-left').style.background=boss.color;
  document.getElementById('glow-right').style.background='#e74c3c';

  // HUD
  document.getElementById('wave-label').textContent=`${boss.isBoss?'👑 ':'⚔️ '}WAVE ${boss.wave} — ${boss.name}`;
  document.getElementById('enemy-hud-name').textContent=boss.name+' '+boss.icon;
  document.getElementById('player-hud-name').textContent='⚔️ 베드로 Lv.'+playerLv;
  document.getElementById('player-tag').textContent='베드로 Lv.'+playerLv;
  document.getElementById('enemy-tag').textContent=boss.name;
  document.getElementById('result-overlay').className='result-overlay';

  // 웨이브 닷
  const wb=document.getElementById('wave-bar');
  wb.innerHTML=BOSSES.map((_,i)=>`<div class="wave-dot ${i<wave?'done':i===wave?'current':''}"></div>`).join('');

  setLog(`📖 <span class="gold">${boss.desc}</span>`);
  updateHUD(); updatePlayerLvUI();
  setButtons(false);
}

function updatePlayerLvUI(){
  const xpPct=Math.min(100,(playerXP/playerXPNeeded)*100);
  document.getElementById('plv-badge').textContent=`Lv.${playerLv} 베드로`;
  document.getElementById('plv-xp-bar').style.width=xpPct+'%';
  document.getElementById('plv-xp-text').textContent=playerXP+' XP';
}

function updateHUD(){
  const boss=BOSSES[wave];
  document.getElementById('player-hp-bar').style.width=(Math.max(0,playerHP)/playerMaxHP*100)+'%';
  document.getElementById('enemy-hp-bar').style.width=(Math.max(0,enemyHP)/enemyMaxHP*100)+'%';
  document.getElementById('player-hp-text').textContent=`HP ${Math.max(0,playerHP)} / ${playerMaxHP}`;
  document.getElementById('enemy-hp-text').textContent=`HP ${Math.max(0,enemyHP)} / ${enemyMaxHP}`;
  document.getElementById('mp-bar').style.width=(mp/100*100)+'%';
  document.getElementById('mp-val').textContent=mp+'/100';
  document.getElementById('sp-bar').style.width=(sp)+'%';
  document.getElementById('sp-val').textContent=Math.floor(sp)+'/100';
  document.getElementById('btn1').disabled=mp<30;
  document.getElementById('btn2').disabled=mp<20;
  document.getElementById('btn3').disabled=sp<100;
}

function setLog(html){document.getElementById('battle-log').innerHTML=html;}
function setButtons(d){['btn0','btn1','btn2','btn3'].forEach(id=>{if(d){document.getElementById(id).disabled=true;}else{updateHUD();}});}

function spawnDmg(x,y,txt,cls){
  const el=document.createElement('div');
  el.className='dmg-num '+cls;
  el.style.left=x+'px';el.style.top=y+'px';
  el.textContent=txt;
  document.getElementById('battle-scene').appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function flash(color){
  const el=document.getElementById('skill-flash');
  el.style.background=color;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',250);
}
function shake(){
  const s=document.getElementById('battle-scene');
  s.style.animation='shake 0.3s ease';
  setTimeout(()=>s.style.animation='',300);
}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

async function playerAttack(skillIdx){
  if(isBattling||gameOver) return;
  isBattling=true;setButtons(true);
  const boss=BOSSES[wave];
  const pStats=getPlayerStats(playerLv);
  const baseAtk=pStats.atk;

  let dmg=0, cost=0, healAmt=0, isCrit=false, isUlt=false;
  const pEl=document.getElementById('player-char');
  const eEl=document.getElementById('enemy-char');

  if(skillIdx===0){
    dmg=baseAtk[0]+Math.floor(Math.random()*(baseAtk[1]-baseAtk[0]+1));
    isCrit=Math.random()<0.15; if(isCrit) dmg=Math.floor(dmg*1.8);
  } else if(skillIdx===1){
    if(mp<30){isBattling=false;setButtons(false);return;}
    dmg=Math.floor(baseAtk[1]*1.5)+Math.floor(Math.random()*15);
    mp-=30;
  } else if(skillIdx===2){
    if(mp<20){isBattling=false;setButtons(false);return;}
    healAmt=20+playerLv*5; mp-=20;
  } else if(skillIdx===3){
    if(sp<100){isBattling=false;setButtons(false);return;}
    dmg=Math.floor(baseAtk[1]*2.5)+Math.floor(Math.random()*20);
    sp=0; isUlt=true;
  }

  if(healAmt>0){
    playerHP=Math.min(playerMaxHP,playerHP+healAmt);
    flash('radial-gradient(circle,#22c55e44,transparent)');
    spawnDmg(30,80,'+'+healAmt,'heal');
    setLog(`💚 <span class="green">믿음의 회복</span>으로 HP를 <span class="green">${healAmt}</span> 회복!`);
    updateHUD(); sp=Math.min(100,sp+10);
  } else {
    pEl.style.animation='player-attack 0.6s ease forwards';
    await wait(300);
    if(isUlt){flash('radial-gradient(circle,#8b5cf6,transparent)');}
    else{flash('radial-gradient(circle,#f4d03f44,transparent)');}
    shake();
    eEl.style.animation='enemy-hit 0.4s ease';
    enemyHP-=dmg;
    spawnDmg(240,70,isCrit?'💥'+dmg:'-'+dmg,isCrit?'crit':'pdmg');
    const sName=['기본 공격','반석의 고백','','성령의 검'][skillIdx];
    setLog(`⚔️ <span class="gold">베드로</span>의 <span class="gold">${sName}</span>${isCrit?' <span class="purple">크리티컬!</span>':''} — <span class="gold">${dmg}</span> 데미지!`);
    sp=Math.min(100,sp+15);
    updateHUD();
    await wait(600);
    pEl.style.animation='idle-bob 1.5s ease-in-out infinite';
  }

  mp=Math.min(100,mp+12);
  if(enemyHP<=0){await victory();return;}

  // 적 반격
  await wait(400);
  let eDmg=boss.atk[0]+Math.floor(Math.random()*(boss.atk[1]-boss.atk[0]+1));
  let specialUsed=false;

  if(Math.random()<boss.specialChance){
    specialUsed=true;
    eEl.style.animation='enemy-attack 0.6s ease forwards';
    await wait(300);
    flash('radial-gradient(circle,#ef444455,transparent)');
    shake();
    // 특수 효과
    if(boss.wave===1){statusEffect={type:'poison',dmg:5,turns:3};eDmg=Math.floor(eDmg*0.8);setLog(`👿 <span class="red">${boss.name}</span>의 <span class="red">${boss.special}</span>! 독에 중독됐습니다! (-5 HP/턴)`);}
    else if(boss.wave===3){statusEffect={type:'curse',atkDown:0.7,turns:2};eDmg=Math.floor(eDmg*0.9);setLog(`🔥 <span class="red">${boss.name}</span>의 <span class="red">${boss.special}</span>! 공격력이 감소합니다!`);}
    else{eDmg=Math.floor(eDmg*1.5);setLog(`💥 <span class="red">${boss.name}</span>의 <span class="red">${boss.special}</span>! <span class="red">${eDmg}</span> 강력한 데미지!`);}
  } else {
    eEl.style.animation='enemy-attack 0.6s ease forwards';
    await wait(300);
    flash('radial-gradient(circle,#ef444433,transparent)');
    shake();
    setLog(`👿 <span class="red">${boss.name}</span>의 반격! <span class="red">${eDmg}</span> 데미지!`);
  }

  document.getElementById('player-char').style.animation='player-hit 0.4s ease';
  playerHP-=eDmg;
  spawnDmg(50,80,'-'+eDmg,'edmg');
  updateHUD();
  await wait(600);
  eEl.style.animation='enemy-idle 1.8s ease-in-out infinite';
  document.getElementById('player-char').style.animation='idle-bob 1.5s ease-in-out infinite';

  // 독 데미지
  if(statusEffect?.type==='poison'){
    await wait(300);
    playerHP-=statusEffect.dmg;
    spawnDmg(50,100,'☠️'+statusEffect.dmg,'edmg');
    statusEffect.turns--;
    if(statusEffect.turns<=0) statusEffect=null;
    updateHUD();
  }

  if(playerHP<=0){defeat();return;}
  isBattling=false;setButtons(false);
}

async function victory(){
  const boss=BOSSES[wave];
  const gainXP=boss.xp;
  playerXP+=gainXP;

  // 레벨업 체크
  let lvUp=false;
  while(playerXP>=playerXPNeeded && playerLv<8){
    playerXP-=playerXPNeeded;
    playerLv++;
    playerXPNeeded=XP_TABLE[Math.min(playerLv,XP_TABLE.length-1)];
    lvUp=true;
  }

  if(lvUp){
    const lp=document.getElementById('levelup-popup');
    lp.style.animation='levelup-pop 1.5s ease forwards';
    lp.textContent=`LEVEL UP! Lv.${playerLv} ⬆️`;
    await wait(1500);
    lp.style.animation='';
    playerHP=Math.min(playerMaxHP,playerHP+30);
  }

  updatePlayerLvUI();

  if(wave>=6){
    // 최종 승리
    document.getElementById('result-title').textContent='👑 완전 승리!';
    document.getElementById('result-title').className='result-title win';
    document.getElementById('result-sub').textContent=`모든 악을 물리쳤습니다!\n+${gainXP} XP 획득! 총 ${playerXP} XP`;
    document.getElementById('result-overlay').className='result-overlay show win';
    gameOver=true;
    return;
  }

  // 웨이브 클리어 메시지
  const wt=document.getElementById('wave-clear-text');
  wt.textContent=`WAVE ${wave+1} CLEAR! +${gainXP}XP`;
  wt.style.animation='wave-clear 2s ease forwards';
  await wait(2000);
  wt.style.animation='';
  wave++;
  initWave();
  setLog(`⚔️ <span class="gold">WAVE ${wave+1} 시작!</span> <span class="red">${BOSSES[wave].name}</span> 등장!`);
}

function defeat(){
  document.getElementById('result-title').textContent='💀 패배...';
  document.getElementById('result-title').className='result-title lose';
  document.getElementById('result-sub').textContent=`${BOSSES[wave].name}에게 쓰러졌습니다.\n포기하지 마세요!`;
  document.getElementById('result-overlay').className='result-overlay show lose';
  gameOver=true;
}

function resetBattle(){
  wave=0;
  playerHP=null;
  initWave();
}

// ── 애니메이션 루프 ──
const PC=document.getElementById('player-canvas').getContext('2d');
const EC=document.getElementById('enemy-canvas').getContext('2d');
setInterval(()=>{
  animF++;
  if(!isBattling){
    drawPeter(PC,animF,playerLv);
    if(wave<BOSSES.length) BOSSES[wave].draw(EC,animF);
  }
},400);

// 초기화
initWave();
</script>
