<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚔️ Bible Quest - 신광청년부 레벨업</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        /* [스타일 시트 - 기존 스타일 유지 및 보정] */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #0a0e1a; color: #e8e8e8; min-height: 100vh; overflow-x: hidden; }
        
        /* 화면 전환용 설정 */
        #login-screen, #class-select-screen, #app { width: 100%; max-width: 430px; margin: 0 auto; min-height: 100vh; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #class-select-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: #0a0e1a; }
        #app { display: none; position: relative; }

        .login-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #f4d03f44; background: #1a1a2e; color: #fff; font-size: 18px; margin-bottom: 14px; outline: none; text-align: center; }
        .login-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #f4d03f, #f39c12); border: none; border-radius: 12px; font-family: 'Black Han Sans', sans-serif; font-size: 20px; cursor: pointer; color: #0a0e1a; }
        .remember-label { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; cursor: pointer; color: #aaa; font-size: 14px; }
        
        /* 랭킹/로그 아이템 */
        .rank-item, .log-item { display: flex; align-items: center; gap: 12px; background: #ffffff08; padding: 14px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #ffffff12; }
        .my-rank { border-color: #f4d03f !important; background: #f4d03f15 !important; }
        
        /* 헤더 및 탭 */
        header { background: linear-gradient(135deg, #0f1923 0%, #1a1032 100%); border-bottom: 1px solid #f4d03f33; padding: 20px 16px 14px; position: sticky; top: 0; z-index: 10; }
        .tabs { display: flex; background: #080c17; border-bottom: 1px solid #ffffff12; overflow-x: auto; position: sticky; top: 120px; z-index: 9; }
        .tab { flex: 1; padding: 10px 5px; background: none; border: none; color: #555; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .tab.active { color: #f4d03f; border-bottom: 2px solid #f4d03f; }
        
        /* 전투 시스템 전용 */
        .bt-scene { position: relative; height: 220px; border-radius: 18px; overflow: hidden; border: 1px solid #ffffff10; margin-bottom: 10px; }
        .bt-char { position: absolute; bottom: 42px; display: flex; flex-direction: column; align-items: center; }
        .player-side { left: 20px; }
        .enemy-side { right: 20px; transform: scaleX(-1); }
        
        /* 공통 카드 스타일 */
        .card { background: #ffffff08; border: 1px solid #ffffff15; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .chapter-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 8px; max-height: 200px; overflow-y: auto; }
        .ch-box { aspect-ratio: 1; border-radius: 7px; border: 1px solid #ffffff20; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; }
        .ch-box.selected { background: #f4d03f; color: #000; font-weight: bold; }
        .ch-box.read-done { background: #f4d03f33; color: #f4d03f; border-color: #f4d03f55; }
        
        /* 팝업 */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .overlay.show { display: flex; }
        
        /* 뱃지/통계 */
        .badge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* 전투 HUD */
        .bt-hp-wrap { height: 8px; background: #333; border-radius: 4px; overflow: hidden; width: 100px; }
        .bt-hp-bar { height: 100%; transition: width 0.3s; }
        .bt-hp-bar.player { background: #22c55e; }
        .bt-hp-bar.enemy { background: #ef4444; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="font-size:60px;margin-bottom:12px">⚔️</div>
    <h1 style="font-family:'Black Han Sans';color:#f4d03f;font-size:36px;margin-bottom:8px">Bible Quest</h1>
    <p style="margin-bottom:28px;color:#888;font-size:14px;line-height:1.6">성경 읽고 레벨업!<br>이름을 입력하고 시작하세요.</p>
    <input type="text" id="user-name-input" class="login-input" placeholder="이름을 입력하세요">
    <label class="remember-label"><input type="checkbox" id="remember-name"> 이름 저장하기</label>
    <button class="login-btn" onclick="login()">⚔️ 모험 시작하기</button>
    <div id="login-loading" style="display:none; margin-top:15px; color:#f4d03f;">⏳ 접속 중...</div>
</div>

<div id="class-select-screen">
    <div style="text-align:center; margin-bottom:20px;">
        <div style="font-size:36px; margin-bottom:6px;">⚔️</div>
        <div style="font-family:'Black Han Sans'; font-size:24px; color:#f4d03f;">클래스 선택</div>
        <div style="font-size:12px; color:#888;">7일 후 변경 가능! 나에게 맞는 제자를 선택하세요.</div>
    </div>
    <div id="class-grid" style="width:100%; display:grid; grid-template-columns:1fr 1fr; gap:10px; overflow-y:auto; padding-bottom:20px;">
        </div>
</div>

<div id="app">
    <header>
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
                <div class="header-title" id="header-display-name" style="font-family:'Black Han Sans'; color:#f4d03f; font-size:20px;">⚔️ Bible Quest</div>
                <div style="font-size:11px; color:#888;">신광청년부 레벨업</div>
            </div>
            <div id="streak-badge" style="background: #e74c3c; padding:4px 10px; border-radius:20px; font-weight:bold; font-size:12px;">🔥 0일 연속</div>
        </div>
        
        <div class="card" style="margin-top:15px; padding:12px; display:flex; gap:15px; align-items:center;">
            <div id="level-icon" style="font-size:30px;">🌱</div>
            <div style="flex:1;">
                <div id="level-num" style="font-family:'Black Han Sans'; color:#f4d03f;">Lv. 1</div>
                <div id="level-name" style="font-size:12px; color:#aaa;">새싹 제자</div>
                <div style="height:6px; background:#333; border-radius:3px; margin-top:8px; overflow:hidden;">
                    <div id="xp-bar" style="width:0%; height:100%; background:#f4d03f;"></div>
                </div>
            </div>
            <div style="text-align:right;">
                <div id="xp-text" style="font-weight:bold;">0 XP</div>
            </div>
        </div>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="showTab('home',this)">🏠<span style="font-size:9px">홈</span></button>
        <button class="tab" onclick="showTab('rank',this)">🏆<span style="font-size:9px">랭킹</span></button>
        <button class="tab" onclick="showTab('record',this)">📜<span style="font-size:9px">기록</span></button>
        <button class="tab" onclick="showTab('battle',this); btInitIfNeeded()">🛡️<span style="font-size:9px">전투</span></button>
        <button class="tab" onclick="showTab('quests',this)">⚔️<span style="font-size:9px">퀘스트</span></button>
        <button class="tab" onclick="showTab('badges',this)">🏅<span style="font-size:9px">뱃지</span></button>
    </div>

    <div class="content" style="padding:15px;">
        <div class="page active" id="page-home">
            <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
                <button onclick="logout()" style="background:none; border:1px solid #333; color:#666; padding:4px 8px; border-radius:5px; font-size:11px;">🚪 로그아웃</button>
            </div>
            <div class="card">
                <label style="font-size:13px; color:#f4d03f; font-weight:bold;">성경책 선택</label>
                <select id="book-select" onchange="onBookChange()" style="width:100%; padding:10px; margin-top:5px; background:#1a1a2e; color:#fff; border:1px solid #333; border-radius:8px;"></select>
                
                <div id="chapter-grid" class="chapter-grid"></div>
                <div id="selected-summary" style="margin-top:10px; font-size:12px; color:#aaa;">장을 선택해주세요.</div>
                <button class="record-btn" onclick="recordReading()" style="width:100%; margin-top:15px; padding:12px; background:#f4d03f; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">✅ 말씀 기록하기</button>
            </div>
        </div>

        <div class="page" id="page-rank">
            <h3 style="margin-bottom:15px; font-family:'Black Han Sans'; color:#f4d03f;">🏆 신광청년부 랭킹</h3>
            <div id="rank-list"></div>
        </div>

        <div class="page" id="page-record">
            <h3 style="margin-bottom:15px; font-family:'Black Han Sans'; color:#f4d03f;">📜 나의 읽기 기록</h3>
            <div id="log-list"></div>
        </div>

        <div class="page" id="page-battle">
            <div id="bt-wave-label" style="text-align:center; color:#f4d03f; margin-bottom:10px; font-weight:bold;">WAVE 1</div>
            <div class="bt-scene" id="bt-scene">
                <div id="bt-scene-bg" style="position:absolute; inset:0; background:#1a1a2e;"></div>
                <div class="bt-char player-side" id="bt-player-char">
                    <canvas id="bt-player-canvas" width="48" height="64"></canvas>
                    <div class="bt-hp-wrap"><div id="bt-player-hp-bar" class="bt-hp-bar player" style="width:100%;"></div></div>
                </div>
                <div class="bt-char enemy-side" id="bt-enemy-char">
                    <canvas id="bt-enemy-canvas" width="48" height="64"></canvas>
                    <div class="bt-hp-wrap"><div id="bt-enemy-hp-bar" class="bt-hp-bar enemy" style="width:100%;"></div></div>
                </div>
            </div>
            <div id="bt-log" style="background:#000; padding:10px; border-radius:8px; font-size:12px; height:50px; overflow-y:auto; margin-bottom:10px; border:1px solid #333;">⚔️ 전투를 시작하세요!</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                <button onclick="btAttack(0)" style="padding:12px; background:#3b82f6; border:none; border-radius:8px; color:#fff; font-weight:bold;">⚔️ 일반 공격</button>
                <button onclick="btAttack(1)" id="btsk1" style="padding:12px; background:#f59e0b; border:none; border-radius:8px; color:#fff; font-weight:bold;">⚓ 스킬(30MP)</button>
                <button onclick="btAttack(2)" id="btsk2" style="padding:12px; background:#22c55e; border:none; border-radius:8px; color:#fff; font-weight:bold;">💚 회복(20MP)</button>
                <button onclick="btAttack(3)" id="btsk3" style="padding:12px; background:#8b5cf6; border:none; border-radius:8px; color:#fff; font-weight:bold;">✨ 필살기</button>
            </div>
            <div style="margin-top:10px; display:flex; gap:10px; font-size:11px;">
                <span>MP: <span id="bt-mp-val">100/100</span></span>
                <span>SP: <span id="bt-sp-val">0/100</span></span>
            </div>
        </div>

        </div>
</div>

<script>
// [데이터 및 시스템 로직]
const SUPABASE_URL = 'https://jwmcjmmzhipbpgniofuk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IVDjIWSWV1u1Q-b0cVRfMQ_T-c-o1WT';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CLASSES = {
    peter: { id:'peter', icon:'⚔️', name:'베드로', title:'반석의 사도', bonus:['마태복음','마가복음','사도행전'], bg:'linear-gradient(135deg,#1e3a8a,#3b82f6)', color:'#3b82f6', skill:'복음서/역사서 XP 1.5배' },
    john: { id:'john', icon:'💛', name:'요한', title:'사랑의 사도', bonus:['요한복음','요한계시록'], bg:'linear-gradient(135deg,#92400e,#f59e0b)', color:'#f59e0b', skill:'요한서신 XP 1.5배' },
    // ... 나머지 10개 클래스 생략 (동일한 구조로 추가 가능)
    matthias: { id:'matthias', icon:'👑', name:'맛디아', title:'순종의 사도', bonus:['사도행전','로마서'], bg:'linear-gradient(135deg,#713f12,#fcd34d)', color:'#fcd34d', skill:'바울서신 XP 1.5배' }
};

// 성경 데이터
const BOOKS = [
    {name:"창세기", ch:50}, {name:"출애굽기", ch:40}, {name:"마태복음", ch:28}, {name:"사도행전", ch:28} // 간략화
];

const LEVELS = [
    {lv:1, title:"새싹 제자", icon:"🌱", xp:0}, {lv:2, title:"말씀 탐험가", icon:"🗺️", xp:50},
    {lv:10, title:"하나님의 용사", icon:"👑", xp:3600}
];

let currentUser = null;
let state = { xp:0, level:1, totalCh:0, streak:0, userClass:null, log:[], bookChapters:{} };
let selectedChs = new Set();

// [로그인 및 화면 제어]
async function login() {
    const name = document.getElementById('user-name-input').value.trim();
    if(!name) return alert("이름을 입력하세요!");
    
    document.getElementById('login-loading').style.display = 'block';
    
    let { data:user, error } = await _supabase.from('users').select('*').eq('name', name).maybeSingle();
    
    if(!user) {
        const { data:newUser } = await _supabase.from('users').insert([{name}]).select().single();
        user = newUser;
    }
    
    currentUser = user;
    state = { ...state, ...user };
    
    document.getElementById('login-loading').style.display = 'none';
    
    if(!state.user_class) {
        showClassSelect();
    } else {
        enterApp();
    }
}

function showClassSelect() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('class-select-screen').style.display = 'flex';
    
    const grid = document.getElementById('class-grid');
    grid.innerHTML = Object.values(CLASSES).map(cls => `
        <div onclick="selectClass('${cls.id}')" style="background:${cls.bg}; padding:15px; border-radius:12px; text-align:center; cursor:pointer; border:1px solid rgba(255,255,255,0.1);">
            <div style="font-size:30px;">${cls.icon}</div>
            <div style="font-weight:bold; font-size:14px;">${cls.name}</div>
            <div style="font-size:10px; color:rgba(255,255,255,0.7);">${cls.skill}</div>
        </div>
    `).join('');
}

async function selectClass(classId) {
    state.user_class = classId;
    await _supabase.from('users').update({user_class: classId}).eq('id', currentUser.id);
    enterApp();
}

function enterApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('class-select-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    
    initBookSelect();
    renderAll();
}

// [핵심 기능: 말씀 기록]
function initBookSelect() {
    const sel = document.getElementById('book-select');
    sel.innerHTML = BOOKS.map(b => `<option value="${b.name}">${b.name} (${b.ch}장)</option>`).join('');
    onBookChange();
}

function onBookChange() {
    selectedChs.clear();
    const bookName = document.getElementById('book-select').value;
    const book = BOOKS.find(b => b.name === bookName);
    const grid = document.getElementById('chapter-grid');
    grid.innerHTML = '';
    
    for(let i=1; i<=book.ch; i++) {
        const box = document.createElement('div');
        box.className = 'ch-box';
        box.textContent = i;
        if(state.bookChapters[bookName]?.includes(i)) box.classList.add('read-done');
        box.onclick = () => {
            if(box.classList.contains('selected')) {
                box.classList.remove('selected');
                selectedChs.delete(i);
            } else {
                box.classList.add('selected');
                selectedChs.add(i);
            }
            document.getElementById('selected-summary').textContent = `${selectedChs.size}장 선택됨`;
        };
        grid.appendChild(box);
    }
}

async function recordReading() {
    if(selectedChs.size === 0) return alert("장을 선택하세요!");
    const bookName = document.getElementById('book-select').value;
    
    const gainedXp = selectedChs.size * 10;
    state.xp += gainedXp;
    state.totalCh += selectedChs.size;
    
    if(!state.bookChapters[bookName]) state.bookChapters[bookName] = [];
    state.bookChapters[bookName].push(...Array.from(selectedChs));
    
    state.log.unshift({ date: new Date().toLocaleDateString(), book: bookName, ch: selectedChs.size, xp: gainedXp });
    
    await _supabase.from('users').update({
        xp: state.xp,
        total_chapters: state.totalCh,
        book_chapters: state.bookChapters,
        log: state.log
    }).eq('id', currentUser.id);
    
    selectedChs.clear();
    onBookChange();
    renderAll();
    alert("기록 완료! +" + gainedXp + "XP");
}

function renderAll() {
    const lv = LEVELS.find(l => state.xp >= l.xp) || LEVELS[0];
    document.getElementById('level-num').textContent = `Lv. ${lv.lv}`;
    document.getElementById('level-name').textContent = lv.title;
    document.getElementById('xp-text').textContent = `${state.xp} XP`;
    document.getElementById('xp-bar').style.width = Math.min(100, (state.xp / 3600) * 100) + '%';
    document.getElementById('header-display-name').textContent = `⚔️ ${currentUser.name}님의 모험`;
}

function showTab(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
}

// [전투 시스템 - 간략 버전]
let btInitialized = false;
let btEnemyHP = 100, btPlayerHP = 100, btMP = 100;

function btInitIfNeeded() {
    if(btInitialized) return;
    btInitialized = true;
    btUpdateHUD();
}

function btUpdateHUD() {
    document.getElementById('bt-player-hp-bar').style.width = btPlayerHP + '%';
    document.getElementById('bt-enemy-hp-bar').style.width = btEnemyHP + '%';
    document.getElementById('bt-mp-val').textContent = btMP + '/100';
}

function btAttack(type) {
    let dmg = 20;
    if(type === 1 && btMP >= 30) { dmg = 40; btMP -= 30; }
    if(type === 2 && btMP >= 20) { btPlayerHP = Math.min(100, btPlayerHP + 30); btMP -= 20; dmg = 0; }
    
    btEnemyHP -= dmg;
    document.getElementById('bt-log').textContent = type===2 ? "체력을 회복했습니다!" : `적에게 ${dmg} 데미지를 입혔습니다!`;
    
    if(btEnemyHP <= 0) {
        alert("승리!");
        btEnemyHP = 100;
    }
    btUpdateHUD();
}

function logout() {
    location.reload();
}
</script>
</body>
</html>
