<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="manifest" href="./manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ Bible Quest - 신광청년부 레벨업</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
/* 전체 레이아웃 밸런스 조정 */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: #0a0e1a; color: #e8e8e8; min-height: 100vh; overflow-x: hidden; }
#app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; display: none; }

/* 헤더 및 카드 디자인 콤팩트화 */
header { background: linear-gradient(135deg, #0f1923 0%, #1a1032 100%); border-bottom: 1px solid #f4d03f33; padding: 12px 16px 8px; position: sticky; top: 0; z-index: 10; }
.level-card { display: flex; justify-content: space-between; align-items: center; background: #ffffff0a; border-radius: 10px; padding: 8px 12px; margin-bottom: 6px; border: 1px solid #f4d03f22; }

/* 랭킹 아이템 내 좋아요 버튼 밸런스 */
.rank-item { display: flex; align-items: center; gap: 10px; background: #ffffff08; padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #ffffff12; }
.like-container { display: flex; align-items: center; gap: 5px; background: #ffffff05; padding: 4px 8px; border-radius: 20px; border: 1px solid #ffffff15; }
.like-btn { background: none; border: none; font-size: 16px; cursor: pointer; filter: grayscale(1); transition: all 0.2s; padding: 0; }
.like-btn.liked { filter: grayscale(0); transform: scale(1.1); }
.like-count { font-size: 12px; color: #f4d03f; font-weight: 700; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }

/* 팝업 UI 밸런스 수정 */
.popup-overlay { display: none; position: fixed; inset: 0; background: #000000bb; align-items: flex-end; justify-content: center; z-index: 300; }
.popup-overlay.show { display: flex; }
.popup-sheet { background: #111827; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 430px; animation: slide-up 0.2s ease-out; }
@keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.like-person { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #ffffff0d; }
.like-avatar { width: 32px; height: 32px; border-radius: 50%; background: #3b82f6; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; }

/* 기존 스타일 유지 */
.chapter-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 8px; }
.ch-box { aspect-ratio: 1; border-radius: 6px; border: 1px solid #ffffff20; background: #ffffff08; display: flex; align-items: center; justify-content: center; font-size: 11px; }
.tabs { display: flex; background: #080c17; border-bottom: 1px solid #ffffff12; }
.tab { flex: 1; padding: 8px 0; background: none; border: none; color: #555; display: flex; flex-direction: column; align-items: center; font-size: 13px; }
.tab.active { color: #f4d03f; border-bottom: 2px solid #f4d03f; }
</style>
</head>
<body>

<div id="login-screen">
  <h1 style="font-family:'Black Han Sans';color:#f4d03f;margin-bottom:20px;">Bible Quest</h1>
  <input type="text" id="user-name-input" class="login-input" placeholder="이름을 입력하세요">
  <button class="login-btn" onclick="login()">⚔️ 모험 시작하기</button>
</div>

<div id="app">
  <header>
    <div class="header-top">
      <div class="header-title" id="header-display-name">⚔️ Bible Quest</div>
      <div class="streak-badge" id="streak-badge">🔥 0일 연속</div>
    </div>
    <div class="level-card">
        <div id="level-icon">🌱</div>
        <div id="level-num">Lv. 1</div>
        <div id="xp-text">0 XP</div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('home',this)"><span>🏠</span><span class="tab-label">홈</span></button>
    <button class="tab" onclick="showTab('rank',this)"><span>🏆</span><span class="tab-label">랭킹</span></button>
    <button class="tab" onclick="showTab('map',this)"><span>📖</span><span class="tab-label">지도</span></button>
  </div>

  <div class="content">
    <div class="page active" id="page-home">
      <div class="card">
        <select id="book-select" onchange="onBookChange()"></select>
        <div class="chapter-grid" id="chapter-grid"></div>
        <button class="record-btn" onclick="recordReading()">✅ 말씀 기록하기</button>
      </div>
    </div>
    <div class="page" id="page-rank"><div id="rank-list"></div></div>
  </div>
</div>

<div class="popup-overlay" id="like-popup-overlay" onclick="closeLikePopup()">
  <div class="popup-sheet" onclick="event.stopPropagation()">
    <div style="width:40px; height:4px; background:#333; border-radius:2px; margin:0 auto 15px;"></div>
    <div style="font-family:'Black Han Sans'; color:#f4d03f; font-size:16px;" id="popup-title">응원 현황</div>
    <div id="like-popup-list" style="margin-top:15px; max-height:300px; overflow-y:auto;"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jwmcjmmzhipbpgniofuk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IVDjIWSWV1u1Q-b0cVRfMQ_T-c-o1WT';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let state = {xp:0, level:1, totalCh:0, bookChapters:{}};

// 랭킹 및 좋아요 렌더링 함수
async function loadRankings() {
  const { data } = await _supabase.from('users').select('*').order('xp', { ascending: false });
  const myLikes = JSON.parse(localStorage.getItem('bq_likes') || '[]');
  
  document.getElementById('rank-list').innerHTML = data.map((user, i) => {
    const isMe = user.name === currentUser?.name;
    const liked = myLikes.includes(user.name);
    const likeFrom = user.like_from || [];
    
    return `
      <div class="rank-item">
        <div style="font-weight:700; width:20px;">${i+1}</div>
        <div style="flex:1;">${user.name} <span style="font-size:10px; color:#666;">Lv.${user.level}</span></div>
        <div class="like-container">
          <button class="like-btn ${liked?'liked':''}" onclick="toggleLike('${user.name}', this)">👍</button>
          <span class="like-count" onclick="showLikePopup('${user.name}', ${JSON.stringify(likeFrom).replace(/"/g, '&quot;')})">${user.likes || 0}</span>
        </div>
        <div style="color:#f4d03f; font-weight:700;">${user.xp}</div>
      </div>
    `;
  }).join('');
}

// 좋아요 토글 함수 (아이콘 클릭 시)
async function toggleLike(targetName, btn) {
  if (targetName === currentUser.name) return; // 본인 제외
  
  let myLikes = JSON.parse(localStorage.getItem('bq_likes') || '[]');
  const isAdding = !myLikes.includes(targetName);
  
  // 데이터 업데이트
  const { data } = await _supabase.from('users').select('likes, like_from').eq('name', targetName).single();
  let newLikes = data.likes || 0;
  let newFrom = data.like_from || [];
  
  if (isAdding) {
    myLikes.push(targetName);
    newLikes += 1;
    newFrom.push(currentUser.name);
  } else {
    myLikes = myLikes.filter(n => n !== targetName);
    newLikes = Math.max(0, newLikes - 1);
    newFrom = newFrom.filter(n => n !== currentUser.name);
  }
  
  localStorage.setItem('bq_likes', JSON.stringify(myLikes));
  await _supabase.from('users').update({ likes: newLikes, like_from: newFrom }).eq('name', targetName);
  loadRankings(); // 즉시 새로고침
}

// 팝업 함수 (숫자 클릭 시)
function showLikePopup(name, list) {
  document.getElementById('popup-title').textContent = `${name}님을 응원한 분들`;
  document.getElementById('like-popup-list').innerHTML = list.length 
    ? list.map(n => `<div class="like-person"><div class="like-avatar">${n[0]}</div><div>${n}</div></div>`).join('')
    : '<div style="text-align:center; padding:20px; color:#555;">아직 응원이 없어요 🥲</div>';
  document.getElementById('like-popup-overlay').classList.add('show');
}

function closeLikePopup() { document.getElementById('like-popup-overlay').classList.remove('show'); }

// 기타 함수 (login, showTab 등은 사용자님의 기존 로직 유지)
async function login() {
  const name = document.getElementById('user-name-input').value.trim();
  if(!name) return;
  const { data } = await _supabase.from('users').select('*').eq('name', name).maybeSingle();
  currentUser = data || (await _supabase.from('users').insert([{name}]).select().single()).data;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('header-display-name').textContent = `⚔️ ${currentUser.name}님`;
  loadRankings();
}

function showTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(name==='rank') loadRankings();
}
</script>
</body>
</html>
