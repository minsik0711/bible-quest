<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚔️ Bible Quest - 신광청년부 레벨업</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        /* CSS 스타일은 공유해주신 원본과 동일하게 유지합니다. (생략 없이 포함) */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #0a0e1a; color: #e8e8e8; min-height: 100vh; }
        #app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; display: none; }
        #login-screen { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .login-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #f4d03f44; background: #1a1a2e; color: #fff; font-size: 18px; margin-bottom: 14px; outline: none; text-align: center; font-family: 'Noto Sans KR', sans-serif; }
        .login-input:focus { border-color: #f4d03f88; }
        .remember-label { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; cursor: pointer; color: #aaa; font-size: 14px; justify-content: center; }
        .remember-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: #f4d03f; cursor: pointer; }
        .login-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #f4d03f, #f39c12); border: none; border-radius: 12px; font-family: 'Black Han Sans', sans-serif; font-size: 20px; cursor: pointer; color: #0a0e1a; }
        .login-loading { color: #888; font-size: 13px; margin-top: 14px; display: none; }
        .rank-item { display: flex; align-items: center; gap: 12px; background: #ffffff08; padding: 14px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #ffffff12; }
        .rank-num { font-family: 'Black Han Sans', sans-serif; font-size: 20px; min-width: 32px; text-align: center; }
        .rank-info { flex: 1; }
        .rank-name { font-weight: 700; font-size: 15px; }
        .rank-xp { font-family: 'Black Han Sans', sans-serif; font-size: 14px; color: #f4d03f; }
        .my-rank { border-color: #f4d03f !important; background: #f4d03f15 !important; }
        .like-btn { background: #ffffff08; border: 1px solid #ffffff20; border-radius: 20px; padding: 5px 10px; font-size: 12px; cursor: pointer; color: #aaa; transition: all 0.15s; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; }
        .like-btn.liked { background: #e74c3c22; border-color: #e74c3c55; color: #e74c3c; }
        .popup-overlay { display: none; position: fixed; inset: 0; background: #000000bb; align-items: flex-end; justify-content: center; z-index: 300; }
        .popup-overlay.show { display: flex; }
        .popup-sheet { background: #111827; border-radius: 24px 24px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 430px; animation: slide-up 0.25s ease-out; max-height: 70vh; overflow-y: auto; }
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .popup-handle { width: 40px; height: 4px; background: #ffffff22; border-radius: 99px; margin: 0 auto 16px; }
        .popup-title { font-family: 'Black Han Sans', sans-serif; font-size: 17px; color: #f4d03f; margin-bottom: 4px; }
        .popup-sub { font-size: 12px; color: #666; margin-bottom: 14px; }
        .like-person { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid #ffffff0d; }
        .like-person:last-child { border-bottom: none; }
        .like-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #1e40af, #3b82f6); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .like-person-name { font-size: 14px; font-weight: 700; flex: 1; }
        .particle { position: fixed; top: 55%; font-size: 20px; pointer-events: none; z-index: 100; animation: float-up 1.5s ease-out forwards; }
        @keyframes float-up { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-130px) scale(0.3); opacity: 0; } }
        .overlay { display: none; position: fixed; inset: 0; background: #000000cc; align-items: center; justify-content: center; z-index: 200; }
        .overlay.show { display: flex; }
        .levelup-box { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid #f4d03f; border-radius: 24px; padding: 40px 32px; text-align: center; position: relative; overflow: hidden; animation: level-pop 0.5s ease-out; }
        .levelup-box::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, #f4d03f22, transparent 70%); }
        @keyframes level-pop { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .lu-icon { font-size: 64px; }
        .lu-title { font-family: 'Black Han Sans', sans-serif; font-size: 36px; color: #f4d03f; letter-spacing: 4px; margin-top: 12px; }
        .lu-lv { font-size: 20px; color: #fff; font-weight: 700; margin-top: 4px; }
        .lu-name { font-size: 16px; color: #f4d03f99; margin-top: 4px; }
        .lu-tap { font-size: 12px; color: #888; margin-top: 20px; }
        header { background: linear-gradient(135deg, #0f1923 0%, #1a1032 100%); border-bottom: 1px solid #f4d03f33; padding: 20px 16px 14px; position: sticky; top: 0; z-index: 10; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .header-title { font-family: 'Black Han Sans', sans-serif; font-size: 20px; color: #f4d03f; letter-spacing: 1px; }
        .header-sub { font-size: 11px; color: #888; margin-top: 2px; }
        .streak-badge { background: linear-gradient(135deg, #c0392b, #e74c3c); border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 700; white-space: nowrap; }
        .level-card { display: flex; justify-content: space-between; align-items: center; background: #ffffff0a; border-radius: 12px; padding: 12px 16px; margin-bottom: 10px; border: 1px solid #f4d03f22; animation: pulse-glow 3s ease-in-out infinite; }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 16px #f4d03f22; } 50% { box-shadow: 0 0 32px #f4d03f55; } }
        .level-left { display: flex; align-items: center; gap: 10px; }
        .level-icon { font-size: 32px; }
        .level-num { font-family: 'Black Han Sans', sans-serif; font-size: 20px; color: #f4d03f; }
        .level-name { font-size: 12px; color: #aaa; }
        .xp-info { text-align: right; }
        .xp-text { font-family: 'Black Han Sans', sans-serif; font-size: 18px; color: #fff; }
        .xp-sub { font-size: 11px; color: #888; margin-top: 2px; }
        .xp-bar-wrap { height: 6px; background: #ffffff15; border-radius: 99px; overflow: hidden; }
        .xp-bar { height: 100%; background: linear-gradient(90deg, #f4d03f, #f39c12); border-radius: 99px; transition: width 0.8s ease; box-shadow: 0 0 8px #f4d03f88; }
        .xp-bar-label { font-size: 11px; color: #888; margin-top: 4px; text-align: right; }
        .tabs { display: flex; background: #080c17; border-bottom: 1px solid #ffffff12; overflow-x: auto; }
        .tab { flex: 1; min-width: 44px; padding: 10px 2px 8px; background: none; border: none; border-bottom: 2px solid transparent; color: #555; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 15px; transition: all 0.2s; }
        .tab.active { color: #f4d03f; border-bottom-color: #f4d03f; }
        .tab-label { font-size: 8px; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
        .content { padding: 12px 14px 80px; }
        .page { display: none; }
        .page.active { display: block; }
        .card-title { font-family: 'Black Han Sans', sans-serif; font-size: 15px; color: #f4d03f; letter-spacing: 0.5px; margin-top: 16px; margin-bottom: 8px; }
        .card { background: #ffffff08; border: 1px solid #ffffff15; border-radius: 16px; padding: 16px; margin-bottom: 8px; }
        .label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; margin-top: 12px; }
        .label:first-child { margin-top: 0; }
        select { width: 100%; background: #1e2235; border: 1px solid #ffffff25; border-radius: 10px; padding: 10px 12px; color: #fff; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; outline: none; }
        .record-btn { width: 100%; padding: 14px; margin-top: 8px; background: linear-gradient(135deg, #f4d03f, #f39c12); border: none; border-radius: 12px; font-family: 'Black Han Sans', sans-serif; font-size: 17px; color: #0a0e1a; cursor: pointer; }
        .chapter-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 8px; max-height: 185px; overflow-y: auto; padding: 2px; }
        .ch-box { aspect-ratio: 1; border-radius: 7px; border: 1px solid #ffffff20; background: #ffffff08; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #888; cursor: pointer; position: relative; }
        .ch-box.selected { background: linear-gradient(135deg, #f4d03f, #f39c12); color: #0a0e1a; font-weight: 700; }
        .ch-box.read-done { background: linear-gradient(135deg, #f4d03f44, #f39c1233); color: #f4d03f; font-weight: 700; border-color: #f4d03f55; cursor: default; }
        .ch-box.read-done::after { content: '✓'; position: absolute; font-size: 7px; top: 2px; right: 2px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .cal-cell { aspect-ratio: 1; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #444; }
        .cal-cell.read { background: linear-gradient(135deg, #f4d03f, #f39c12); color: #0a0e1a; font-weight: 700; }
        .cal-cell.today { border: 1px solid #f4d03f88; color: #fff; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="font-size:60px;margin-bottom:12px">⚔️</div>
    <h1 style="font-family:'Black Han Sans';color:#f4d03f;font-size:36px;margin-bottom:8px">Bible Quest</h1>
    <p style="margin-bottom:28px;color:#888;font-size:14px;line-height:1.6">성경 읽고 레벨업!<br>이름을 입력하고 시작하세요.</p>
    <input type="text" id="user-name-input" class="login-input" placeholder="이름을 입력하세요" onkeydown="if(event.key==='Enter') login()">
    <label class="remember-label"><input type="checkbox" id="remember-name"> 이름 저장하기</label>
    <button class="login-btn" onclick="login()">⚔️ 모험 시작하기</button>
    <div class="login-loading" id="login-loading">⏳ 접속 중...</div>
</div>

<div id="app">
    <header>
        <div class="header-top">
            <div>
                <div class="header-title" id="header-display-name">⚔️ Bible Quest</div>
                <div class="header-sub">신광청년부 레벨업 프로젝트</div>
            </div>
            <div class="streak-badge" id="streak-badge">🔥 0일 연속</div>
        </div>
        <div class="level-card">
            <div class="level-left">
                <div class="level-icon" id="level-icon">🌱</div>
                <div>
                    <div class="level-num" id="level-num">Lv. 1</div>
                    <div class="level-name" id="level-name">새싹 제자</div>
                </div>
            </div>
            <div class="xp-info">
                <div class="xp-text" id="xp-text">0 XP</div>
                <div class="xp-sub" id="xp-sub">총 0장 읽음</div>
            </div>
        </div>
        <div class="xp-bar-wrap"><div class="xp-bar" id="xp-bar" style="width:0%"></div></div>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="showTab('home',this)"><span>🏠</span><span class="tab-label">홈</span></button>
        <button class="tab" onclick="showTab('rank',this)"><span>🏆</span><span class="tab-label">랭킹</span></button>
        <button class="tab" onclick="showTab('record',this)"><span>📜</span><span class="tab-label">기록</span></button>
        <button class="tab" onclick="showTab('quests',this)"><span>⚔️</span><span class="tab-label">퀘스트</span></button>
        <button class="tab" onclick="showTab('badges',this)"><span>🏅</span><span class="tab-label">뱃지</span></button>
        <button class="tab" onclick="showTab('map',this)"><span>📖</span><span class="tab-label">통독지도</span></button>
        <button class="tab" onclick="showTab('calendar',this)"><span>📅</span><span class="tab-label">캘린더</span></button>
        <button class="tab" onclick="showTab('levels',this)"><span>📊</span><span class="tab-label">레벨</span></button>
    </div>

    <div class="content">
        <div class="page active" id="page-home">
            <div style="display:flex;justify-content:flex-end;margin-bottom:4px">
                <button class="logout-btn-small" onclick="logout()">🚪 로그아웃</button>
            </div>
            <div class="card-title">📖 오늘 읽은 말씀 기록</div>
            <div class="card">
                <label class="label">성경책 선택</label>
                <select id="book-select" onchange="onBookChange()"></select>
                <label class="label">읽은 장 선택</label>
                <div class="chapter-grid" id="chapter-grid"></div>
                <div class="selected-summary" id="selected-summary">읽은 장을 선택해주세요 📖</div>
                <div class="xp-preview" id="xp-preview"></div>
                <button class="record-btn" id="record-btn" onclick="recordReading()">✅ 말씀 기록하기</button>
            </div>
            <div class="card-title">⚡ 오늘의 퀘스트</div>
            <div id="home-quests"></div>
        </div>
        
        <div class="page" id="page-rank"><div id="rank-list"></div></div>
        <div class="page" id="page-record"><div id="log-list"></div></div>
        <div class="page" id="page-quests"><div id="quest-list"></div></div>
        <div class="page" id="page-badges"><div id="badge-grid"></div></div>
        <div class="page" id="page-map"><div id="bible-map"></div></div>
        <div class="page" id="page-calendar">
            <div id="cal-month-title"></div>
            <div class="cal-grid" id="cal-cells"></div>
        </div>
        <div class="page" id="page-levels"><div id="level-guide-list"></div></div>
    </div>
</div>

<script>
    // Supabase 설정
    const SUPABASE_URL = 'https://jwmcjmmzhipbpgniofuk.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_IVDjIWSWV1u1Q-b0cVRfMQ_T-c-o1WT';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 데이터 정의 (BOOKS, LEVELS, BADGES 등)
    const BOOK_CATEGORIES = [
        { label:"📜 율법서 (창~신)", mapId:"율법서", books:[{name:"창세기",ch:50},{name:"출애굽기",ch:40},{name:"레위기",ch:27},{name:"민수기",ch:36},{name:"신명기",ch:34}]},
        { label:"⚔️ 역사서 (수~에)", mapId:"역사서구약", books:[{name:"여호수아",ch:24},{name:"사사기",ch:21},{name:"룻기",ch:4},{name:"사무엘상",ch:31},{name:"사무엘하",ch:24},{name:"열왕기상",ch:22},{name:"열왕기하",ch:25},{name:"역대상",ch:29},{name:"역대하",ch:36},{name:"에스라",ch:10},{name:"느헤미야",ch:13},{name:"에스더",ch:10}]},
        { label:"🎵 시가서 (욥~아)", mapId:"시가서", books:[{name:"욥기",ch:42},{name:"시편",ch:150},{name:"잠언",ch:31},{name:"전도서",ch:12},{name:"아가",ch:8}]},
        { label:"🔥 대선지서 (사~단)", mapId:"대선지서", books:[{name:"이사야",ch:66},{name:"예레미야",ch:52},{name:"예레미야애가",ch:5},{name:"에스겔",ch:48},{name:"다니엘",ch:12}]},
        { label:"🌿 소선지서 (호~말)", mapId:"소선지서", books:[{name:"호세아",ch:14},{name:"요엘",ch:3},{name:"아모스",ch:9},{name:"오바댜",ch:1},{name:"요나",ch:4},{name:"미가",ch:7},{name:"나훔",ch:3},{name:"하박국",ch:3},{name:"스바냐",ch:3},{name:"학개",ch:2},{name:"스가랴",ch:14},{name:"말라기",ch:4}]},
        { label:"✝️ 복음서 (마~요)", mapId:"복음서", books:[{name:"마태복음",ch:28},{name:"마가복음",ch:16},{name:"누가복음",ch:24},{name:"요한복음",ch:21}]},
        { label:"📖 역사서 (행)", mapId:"역사서신약", books:[{name:"사도행전",ch:28}]},
        { label:"✉️ 바울서신 (롬~몬)", mapId:"바울서신", books:[{name:"로마서",ch:16},{name:"고린도전서",ch:16},{name:"고린도후서",ch:13},{name:"갈라디아서",ch:6},{name:"에베소서",ch:6},{name:"빌립보서",ch:4},{name:"골로새서",ch:4},{name:"데살로니가전서",ch:5},{name:"데살로니가후서",ch:3},{name:"디모데전서",ch:6},{name:"디모데후서",ch:4},{name:"디도서",ch:3},{name:"빌레몬서",ch:1}]},
        { label:"📩 일반서신 (히~유)", mapId:"일반서신", books:[{name:"히브리서",ch:13},{name:"야고보서",ch:5},{name:"베드로전서",ch:5},{name:"베드로후서",ch:3},{name:"요한일서",ch:5},{name:"요한이서",ch:1},{name:"요한삼서",ch:1},{name:"유다서",ch:1}]},
        { label:"👑 예언서 (계)", mapId:"예언서신약", books:[{name:"요한계시록",ch:22}]}
    ];
    const BOOKS = BOOK_CATEGORIES.flatMap(c=>c.books);
    const LEVELS = [{lv:1,title:"새싹 제자",icon:"🌱",xp:0},{lv:2,title:"말씀 탐험가",icon:"🗺️",xp:50},{lv:3,title:"믿음의 전사",icon:"⚔️",xp:150},{lv:4,title:"지혜의 수호자",icon:"🛡️",xp:300},{lv:5,title:"은혜의 기사",icon:"✨",xp:500},{lv:6,title:"빛의 사도",icon:"🌟",xp:800},{lv:7,title:"성령의 검사",icon:"⚡",xp:1200},{lv:8,title:"말씀의 장로",icon:"📖",xp:1800},{lv:9,title:"거룩한 선지자",icon:"🔥",xp:2600},{lv:10,title:"하나님의 용사",icon:"👑",xp:3600}];

    // 상태 관리 객체
    let currentUser = null;
    let state = {xp:0, level:1, totalCh:0, streak:0, bestStreak:0, lastDate:null, readBooks:[], badges:[], completedQuests:[], questDate:null, log:[], claimedBonuses:[], readDates:[], bookChapters:{}};
    let calYear, calMonth;
    let selectedChs = new Set();

    // 로그인 함수
    async function login(){
        const nameInput = document.getElementById('user-name-input');
        const name = nameInput.value.trim();
        if(!name){alert("이름을 입력하세요!"); return;}
        
        const remember = document.getElementById('remember-name').checked;
        if(remember) localStorage.setItem('bq_saved_name', name);
        else localStorage.removeItem('bq_saved_name');
        
        await loginWithName(name);
    }

    async function loginWithName(name){
        document.getElementById('login-loading').style.display='block';
        let {data:user, error} = await _supabase.from('users').select('*').eq('name', name).maybeSingle();
        
        if(error){ alert("접속 에러!"); document.getElementById('login-loading').style.display='none'; return;}
        
        if(!user){
            const {data:newUser, error:insError} = await _supabase.from('users').insert([{name}]).select().single();
            if(insError){alert("계정 생성 실패!"); return;}
            user = newUser;
        }
        
        currentUser = user;
        // DB 데이터로 상태 업데이트 및 null 방지 로직
        state = {
            xp: user.xp || 0,
            level: user.level || 1,
            totalCh: user.total_chapters || 0,
            streak: user.streak || 0,
            bestStreak: user.best_streak || 0,
            lastDate: user.last_date,
            readBooks: user.read_books || [],
            badges: user.badges || [],
            completedQuests: user.completed_quests || [],
            questDate: user.quest_date,
            log: user.log || [],
            claimedBonuses: user.claimed_bonuses || [],
            readDates: user.read_dates || [],
            bookChapters: user.book_chapters || {}, // jsonb 데이터 대응
            likeFrom: user.like_from || []           // jsonb 데이터 대응
        };

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('header-display-name').textContent = `⚔️ ${user.name}님의 모험`;
        
        const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth();
        initBookSelect();
        renderAll();
    }

    // 초기화 및 렌더링 함수들 (이후 로직은 공유해주신 원본과 동일하게 포함하면 됩니다)
    function initBookSelect(){
        const sel = document.getElementById('book-select');
        BOOK_CATEGORIES.forEach(cat => {
            const grp = document.createElement('optgroup');
            grp.label = cat.label;
            cat.books.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.name;
                opt.textContent = `${b.name} (${b.ch}${b.name==='시편'?'편':'장'})`;
                grp.appendChild(opt);
            });
            sel.appendChild(grp);
        });
        renderChapterGrid(sel.value);
    }

    // 캘린더, 통독지도, 랭킹 불러오기 등 나머지 함수들을 이곳에 배치하세요...
    // (보내주신 코드의 나머지 부분을 여기에 붙여넣으시면 됩니다.)

    window.onload = () => {
        const savedName = localStorage.getItem('bq_saved_name');
        if(savedName){
            document.getElementById('user-name-input').value = savedName;
            document.getElementById('remember-name').checked = true;
        }
    };
</script>
</body>
</html>
